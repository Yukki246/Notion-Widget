<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  margin: 0;
  height: 100vh;
  background: #050505;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  font-family: system-ui, sans-serif;
}

.icon {
  font-size: 80px;
  color: #7aff00;
  text-shadow:
    0 0 8px #5fb300,
    0 0 16px #3f8f00,
    0 0 26px #1f5a00;
  animation: pulse 2.4s ease-in-out infinite;
}

@keyframes pulse {
  0%   { transform: scale(1);   text-shadow: 0 0 8px #5fb300, 0 0 16px #3f8f00, 0 0 26px #1f5a00; }
  40%  { transform: scale(1.08); text-shadow: 0 0 14px #7aff00, 0 0 26px #5fb300, 0 0 40px #3f8f00; }
  100% { transform: scale(1);   text-shadow: 0 0 8px #5fb300, 0 0 16px #3f8f00, 0 0 26px #1f5a00; }
}

/* subtle scanline */
.overlay {
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.03) 0px,
    rgba(255,255,255,0.03) 1px,
    transparent 2px,
    transparent 3px
  );
  mix-blend-mode: soft-light;
  pointer-events: none;
}
</style>
</head>
<body>
  <div class="icon">$</div>
  <div class="overlay"></div>
</body>
</html>
