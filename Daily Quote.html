<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Daily Neon Affirmation</title>

  <style>
    :root {
      --neon-core: #D6B3FF;
      --neon-inner: #C59AFF;
      --neon-mid: #B37AFF;
      --neon-outer: #8F5AFF;
      --neon-haze: rgba(147, 94, 255, 0.35);
    }

    body {
      background: #191919; /* Notion dark mode */
      margin: 0;
      height: 260px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Segoe UI", sans-serif;
    }

    .quote {
      font-size: 1.9rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-align: center;
      max-width: 900px;
      color: var(--neon-core);

      opacity: 0;
      animation:
        fadeIn 1.6s ease forwards,
        pulse 2.6s ease-in-out infinite,
        flicker 9s infinite;

      text-shadow:
        0 0 10px var(--neon-core),
        0 0 22px var(--neon-inner),
        0 0 38px var(--neon-mid),
        0 0 70px var(--neon-outer),
        0 0 110px var(--neon-haze);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0% { opacity: 0.92; }
      40% { opacity: 1; }
      70% { opacity: 0.96; }
      100% { opacity: 0.92; }
    }

    @keyframes flicker {
      0%, 92%, 100% { opacity: 1; }
      93% { opacity: 0.55; }
      94% { opacity: 0.85; }
      95% { opacity: 0.40; }
      96% { opacity: 1; }
    }
  </style>
</head>

<body>
  <div class="quote" id="quoteBox"></div>

  <script>
    const quotes = [
      /* --- Affirmations --- */
      "You are becoming someone your future self will trust.",
      "Quiet progress is still progress.",
      "You are building a life that feels steady and intentional.",
      "Small steps today create big shifts later.",
      "You are allowed to grow at your own pace.",

      /* --- FNaF-inspired (safe, short, non-copyrighted) --- */
      "Stay alert. Stay steady.",
      "You’re stronger than the things that used to scare you.",
      "Even in the dark, you move with purpose.",
      "You don’t freeze — you adapt.",
      "You’ve survived worse nights than this.",

      /* --- Anime-inspired (short, paraphrased, safe) --- */
      "Your story is still unfolding.",
      "You rise because you choose to rise.",
      "Your strength grows every time you refuse to give up.",
      "You carry more potential than you realise.",
      "Even small sparks can light the whole path."
    ];

    document.getElementById("quoteBox").textContent =
      quotes[Math.floor(Math.random() * quotes.length)];
  </script>
</body>
</html>
